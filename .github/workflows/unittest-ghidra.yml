name: Test with Ghidra

on: [push, pull_request]

jobs:
#   fetch-deps:
#     name: Prepare sample binary files
#     uses: ./.github/workflows/binfiles.yml

  test:
    name: 'Ghidra integration tests'
    runs-on: 'ubuntu-latest'

    container:
      image: blacktop/ghidra:12.0.2
      env:
        # not set by default for some reason
        GHIDRA_INSTALL_DIR: '/ghidra'

    # needs: fetch-deps
    
    steps:
    - uses: actions/checkout@v4

    # Can't make this work at the moment. Possibly a docker-in-docker issue?
    #
    # - name: Restore sample binaries
    #   id: cache
    #   uses: actions/cache/restore@v3
    #   with:
    #     enableCrossOsArchive: true
    #     fail-on-cache-miss: true
    #     path: binfiles
    #     key: binfiles

    # Install manually because the install action does not work
    - name: Install python
      shell: bash
      run: |
        apt-get update
        apt-get -y install python3 python3-pip python3-venv
        python3 -m venv .venv

    - name: Install python libraries
      shell: bash
      run: |
        source .venv/bin/activate
        pip install -r requirements.txt -r requirements-tests.txt

    - name: Run unit tests
      shell: bash
      run: |
        source .venv/bin/activate
        pytest . --require-ghidra
        # pytest . --binfiles=binfiles --require-binfiles --require-ghidra
